<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Client Form</title>
  <!-- Tailwind CDN for quick demo (replace with build-time Tailwind in production) -->
  <link rel="stylesheet" href="output.css">
</head>
<body class="bg-gray-100 p-6">
  <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg overflow-hidden">
    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">Sender / Company details</h2>
        <span class="text-sm text-gray-500">✎ Tax Registration Number</span>
      </div>

      <form id="senderForm" class="space-y-6">
        <!-- Row: Company + Tax -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Company / Sender name <span class="text-red-500">*</span></label>
            <input required name="company" type="text" class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Company name">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tax Registration Number</label>
            <input name="tax" type="text" class="w-full rounded-md border border-gray-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="TRN">
          </div>
        </div>

        <!-- Row: First / Last -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">First name</label>
            <input name="first" type="text" class="w-full rounded-md border border-gray-300 px-3 py-2" placeholder="First name">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Last name</label>
            <input name="last" type="text" class="w-full rounded-md border border-gray-300 px-3 py-2" placeholder="Last name">
          </div>
        </div>

        <!-- Row: Address lines -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Address line 1</label>
            <input name="addr1" type="text" class="w-full rounded-md border border-gray-300 px-3 py-2" placeholder="Street, building">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Address line 2</label>
            <input name="addr2" type="text" class="w-full rounded-md border border-gray-300 px-3 py-2" placeholder="Apartment, suite (optional)">
          </div>
        </div>

        <!-- Row: Postal code / City -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Postal code</label>
            <input name="postal" type="text" class="w-full rounded-md border border-gray-300 px-3 py-2" placeholder="Postal code">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
            <input name="city" type="text" class="w-full rounded-md border border-gray-300 px-3 py-2" placeholder="City">
          </div>
        </div>

        <!-- Row: Country + Phone -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
          <div class="md:col-span-1">
            <label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
            <select id="countrySelect" name="country" class="w-full rounded-md border border-gray-300 px-3 py-2">
              <option value="">- Select -</option>
              <option value="pk" data-code="+92" data-flag="🇵🇰">Pakistan</option>
              <option value="us" data-code="+1" data-flag="🇺🇸">United States</option>
              <option value="ae" data-code="+971" data-flag="🇦🇪">United Arab Emirates</option>
              <option value="af" data-code="+93" data-flag="🇦🇫">Afghanistan</option>
              <!-- add more as needed -->
            </select>
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone number</label>
            <div class="flex gap-2">
              <!-- country code + flag -->
              <div class="flex items-center rounded-md border border-gray-300 px-3 py-2 min-w-[120px]" id="phone-prefix">
                <span id="flagEmoji" class="mr-2">—</span>
                <span id="countryCode" class="text-sm text-gray-700">+—</span>
                <svg class="ml-auto w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
              </div>

              <input name="phone" type="tel" id="phoneInput" class="flex-1 rounded-md border border-gray-300 px-3 py-2" placeholder="70 123 4567">
            </div>
          </div>
        </div>

        <!-- Row: Email / Website -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input name="email" type="email" class="w-full rounded-md border border-gray-300 px-3 py-2" placeholder="name@example.com">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Web site</label>
            <input name="website" type="url" class="w-full rounded-md border border-gray-300 px-3 py-2" placeholder="https://">
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex items-center justify-between pt-4">
          <button type="button" onclick="document.getElementById('senderForm').reset();" class="inline-flex items-center gap-2 px-4 py-2 border rounded-md text-sm text-gray-700 hover:bg-gray-50">
            Cancel
          </button>

          <button type="submit" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm">
            ✅ Set sender data
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Minimal JS: update phone prefix UI when country changes, simple form submit demonstration
    const countrySelect = document.getElementById('countrySelect');
    const flagEmoji = document.getElementById('flagEmoji');
    const countryCode = document.getElementById('countryCode');
    const senderForm = document.getElementById('senderForm');

    function updatePhonePrefix() {
      const selected = countrySelect.selectedOptions[0];
      const code = selected?.dataset?.code || '+—';
      const flag = selected?.dataset?.flag || '—';
      countryCode.textContent = code;
      flagEmoji.textContent = flag;
    }

    countrySelect.addEventListener('change', updatePhonePrefix);
    // initialize
    updatePhonePrefix();

    // Handle form submit (example)
    senderForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(senderForm);
      const data = Object.fromEntries(fd.entries());
      // Basic required validation for company
      if (!data.company || data.company.trim() === '') {
        alert('Company / Sender name is required.');
        return;
      }
      // In real app: send data to server via fetch/AJAX
      console.log('Form data:', data);
      alert('Sender data saved (demo). Check console for data object.');
    });
  </script>
</body>
</html>
